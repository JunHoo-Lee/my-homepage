    - generic [ref=e69]:
      - heading "Abstract" [level=2] [ref=e70]
      - generic [ref=e71]:
        - paragraph [ref=e72]: Deep learning achieves remarkable accuracy, but it still hides the samples and cues that actually shape its decision boundary. Deep Support Vectors asks whether a modern classifier can recover something as structurally important and interpretable as classic support vectors.
        - paragraph [ref=e73]: "The paper introduces DeepKKT, a deep-learning adaptation of the Karush-Kuhn-Tucker condition, to identify or synthesize Deep Support Vectors (DSVs). These DSVs behave like boundary-defining samples: they exhibit high uncertainty, summarize model behavior, and reveal what features a classifier relies on to separate classes."
        - paragraph [ref=e74]: That same optimization recipe also leads to practical few-shot distillation and classifier-driven generation. One framework ties together interpretability, compression, and synthesis without requiring the original training set at reconstruction time.
    - generic [ref=e78]:
      - heading "Key Ideas" [level=2] [ref=e79]
      - generic [ref=e80]:
        - article [ref=e81]:
          - img [ref=e83]
          - heading "Recover boundary-critical samples" [level=3] [ref=e87]
          - paragraph [ref=e88]: "DSVs act like support vectors for deep networks: they sit near the boundary, surface uncertainty, and summarize what the classifier treats as essential."
        - article [ref=e89]:
          - img [ref=e91]
          - heading "Distill from a trained classifier" [level=3] [ref=e98]
          - paragraph [ref=e99]: DeepKKT turns a frozen classifier into a practical distillation signal, avoiding the usual full-dataset, snapshot-heavy matching pipelines.
        - article [ref=e100]:
          - img [ref=e102]
          - heading "Reuse classification as generation" [level=3] [ref=e105]
          - paragraph [ref=e106]: Once labels become latent variables, the same optimization supports synthesis, interpolation, and editing without a separate generator.
    - generic [ref=e110]:
      - heading "DeepKKT" [level=2] [ref=e111]
      - generic [ref=e112]:
        - paragraph [ref=e113]: DeepKKT extends the KKT recipe from maximum-margin classifiers to overparameterized deep networks. Instead of only enforcing correct classification, it also tracks dual feasibility, a stationarity-style relation between the trained model and candidate samples, and a manifold prior that keeps synthesized DSVs on plausible data support.
        - paragraph [ref=e114]: This produces a practical recipe for recovering support-vector-like samples from a trained classifier without replaying full training. In the paper, the conditions are evaluated on ConvNet and ResNet backbones across CIFAR10, CIFAR100, SVHN, and ImageNet.
      - generic [ref=e115]:
        - generic [ref=e116]:
          - generic [ref=e117]: Primal
          - paragraph [ref=e118]: arg max Phi_c(x_i; theta*) = y_i
          - paragraph [ref=e119]: Candidate DSVs must still land on the target class.
        - generic [ref=e120]:
          - generic [ref=e121]: Dual
          - paragraph [ref=e122]: lambda_i >= 0
          - paragraph [ref=e123]: The multiplier becomes a natural measure of sample importance.
        - generic [ref=e124]:
          - generic [ref=e125]: Stationarity
          - paragraph [ref=e126]: theta* ~= sum_i lambda_i grad_theta L(Phi(x_i; theta*), y_i)
          - paragraph [ref=e127]: Support-vector structure is tied back to the trained model.
        - generic [ref=e128]:
          - generic [ref=e129]: Manifold
          - paragraph [ref=e130]: x_i in M
          - paragraph [ref=e131]: Synthesized DSVs stay close to plausible data support.
      - article [ref=e133]:
