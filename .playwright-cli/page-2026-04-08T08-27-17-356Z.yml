    - generic [ref=e261]:
      - heading "Visual Evidence" [level=2] [ref=e262]
      - generic [ref=e263]:
        - paragraph [ref=e264]: The paper makes the support-vector analogy concrete in several ways. Candidate DSVs become higher-entropy over optimization, consistent with moving toward a decision boundary, and the learned Lagrange multipliers correlate with downstream classwise test accuracy.
        - paragraph [ref=e265]: The same decision signals are also visible. DSV-guided edits expose the precise traits a classifier leans on, showing how local semantic changes can flip the model's prediction.
      - generic [ref=e266]:
        - article [ref=e267]:
          - generic [ref=e268]:
            - heading "Entropy rises near the boundary" [level=3] [ref=e269]
            - paragraph [ref=e270]: "Rendered from `figure/Entropy_DSV.pdf`. As optimization proceeds, DSV candidates become higher-entropy, which matches the intuition that support vectors should lie close to the decision boundary."
          - img "Entropy change figure from the Deep Support Vectors source." [ref=e272]
        - article [ref=e273]:
          - generic [ref=e274]:
            - heading "Lambda tracks classwise generalization" [level=3] [ref=e275]
            - paragraph [ref=e276]: "Rendered from `figure/pearson.pdf`. The source figure links the sum of learned lambda values to classwise test accuracy, turning DeepKKT multipliers into a readable importance signal."
          - img "Pearson correlation figure from the Deep Support Vectors source." [ref=e278]
        - article [ref=e279]:
          - generic [ref=e280]:
            - heading "Decision criteria become editable" [level=3] [ref=e281]
            - paragraph [ref=e282]: "Rendered from `figure/editimages.pdf`. The examples show original images, DSV-informed manual edits, and DeepKKT-based edits that change the classifier's prediction by altering the precise cue it relies on."
          - img "Edited image examples from the Deep Support Vectors source." [ref=e284]
    - generic [ref=e288]:
      - heading "Classifier as Generator" [level=2] [ref=e289]
      - generic [ref=e290]:
        - paragraph [ref=e291]: DeepKKT also reframes a classifier as a latent generative model. By treating labels or soft labels as latent variables, the method can synthesize unseen images, interpolate between classes, and perform semantically meaningful edits.
        - paragraph [ref=e292]: The source figures further show why the full objective matters. Primal-only optimization does not yield meaningful samples, while the stationarity-aware objective produces sharper, more class-consistent generations that stay close to the data manifold.
      - generic [ref=e293]:
